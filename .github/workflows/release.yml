name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # release-please must create the draft first. GoReleaser uploads into that
      # existing draft so immutable releases never need post-publish mutation.
      - name: Verify draft release handoff
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_json=""
          for attempt in $(seq 1 24); do
            releases_json="$(gh api "/repos/${GITHUB_REPOSITORY}/releases?per_page=100")"
            release_json="$(jq -cer --arg tag "${GITHUB_REF_NAME}" '
              map(select(.tag_name == $tag and .draft == true)) | first
            ' <<<"${releases_json}" 2>/dev/null || true)"

            if [[ -n "${release_json}" && "${release_json}" != "null" ]]; then
              break
            fi

            printf 'waiting for draft release handoff (%s/24)\n' "${attempt}"
            sleep 5
          done

          if [[ -z "${release_json}" || "${release_json}" == "null" ]]; then
            echo "draft release ${GITHUB_REF_NAME} not found" >&2
            exit 1
          fi

          release_id="$(jq -r '.id' <<<"${release_json}")"
          tag_name="$(jq -r '.tag_name' <<<"${release_json}")"
          is_draft="$(jq -r '.draft' <<<"${release_json}")"
          release_url="$(jq -r '.html_url' <<<"${release_json}")"

          printf 'draft release %s: %s\n' "${release_id}" "${release_url}"

          if [[ "${tag_name}" != "${GITHUB_REF_NAME}" ]]; then
            echo "release tag mismatch: expected ${GITHUB_REF_NAME}, got ${tag_name}" >&2
            exit 1
          fi

          if [[ "${is_draft}" != "true" ]]; then
            echo "release ${GITHUB_REF_NAME} is not a draft release" >&2
            exit 1
          fi

  release:
    needs: verify-draft-release
    uses: ./.github/workflows/reusable-release.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  publish-draft-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_id="$(
            gh api "/repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
              jq -er --arg tag "${GITHUB_REF_NAME}" '
                map(select(.tag_name == $tag)) | first.id // error("release not found")
              '
          )"

          gh api \
            --method PATCH \
            "/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -f draft=false \
            >/dev/null
