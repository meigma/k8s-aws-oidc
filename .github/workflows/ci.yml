name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-setup: true
          cache-base: master

      - name: Restore Go Caches
        id: go-cache-restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go
            ~/.cache/go-build
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-go-moon-${{ hashFiles('go.mod', 'go.sum', '.golangci.yml', '.moon/toolchains.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-moon-

      - name: Run Moon CI
        run: moon ci --summary minimal

      - name: Save Go Caches
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master' && steps.go-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go
            ~/.cache/go-build
            ~/.cache/golangci-lint
          key: ${{ steps.go-cache-restore.outputs.cache-primary-key }}
