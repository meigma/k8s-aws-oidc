name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine Snapshot Version
        id: snapshot-version
        run: echo "value=0.0.0-SNAPSHOT-$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Set Up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.0.4

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-setup: true
          cache-base: master

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Restore Go Caches
        id: go-cache-restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go
            ~/.cache/go-build
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-go-moon-${{ hashFiles('go.mod', 'go.sum', '.golangci.yml', '.moon/toolchains.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-moon-

      - name: Run Moon CI
        run: moon ci --summary minimal

      - name: Run GoReleaser Check
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: v2.14.3
          args: check

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser Snapshot
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: v2.14.3
          args: release --snapshot --clean --skip=sign

      - name: Scan Snapshot AMD64 Image With Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/meigma/k8s-aws-oidc:${{ steps.snapshot-version.outputs.value }}-amd64
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Scan Snapshot ARM64 Image With Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/meigma/k8s-aws-oidc:${{ steps.snapshot-version.outputs.value }}-arm64
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          skip-setup-trivy: true

      - name: Generate Snapshot Image SBOM
        run: |
          syft "ghcr.io/meigma/k8s-aws-oidc:${{ steps.snapshot-version.outputs.value }}-amd64" \
            -o "spdx-json=/tmp/k8s-aws-oidc_${{ steps.snapshot-version.outputs.value }}_amd64.spdx.json"

      - name: Package Helm Chart
        run: |
          rm -rf /tmp/chart-dist
          mkdir -p /tmp/chart-dist
          helm package chart/ -d /tmp/chart-dist

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run actionlint
        run: |
          bin_dir="$(go env GOBIN)"
          if [ -z "${bin_dir}" ]; then
            bin_dir="$(go env GOPATH)/bin"
          fi
          "${bin_dir}/actionlint" -color

      - name: Save Go Caches
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master' && steps.go-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go
            ~/.cache/go-build
            ~/.cache/golangci-lint
          key: ${{ steps.go-cache-restore.outputs.cache-primary-key }}
