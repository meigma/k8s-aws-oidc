name: Release Please

on:
  push:
    branches:
      - master

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Mint GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@7bd03711494f032dfa3be3558f7dc8787b0be333 # v3.1.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # release-please owns the release PR, tag, and initial draft release.
      # Immutable releases stay enabled, so the tag workflow uploads assets into
      # that draft and only publishes it after attestation succeeds.
      # If a repository tag ruleset exists, this GitHub App must bypass it so
      # force-tag-creation can create the tag ref.
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
