# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: k8s-aws-oidc

release:
  disable: "{{ .Env.GORELEASER_DISABLE_GITHUB_RELEASE }}"
  draft: true
  use_existing_draft: true
  replace_existing_artifacts: true
  mode: keep-existing

gomod:
  # Build from the checked out source tree so fresh tags and rehearsal-only
  # versions do not depend on proxy.golang.org being indexed first.
  proxy: false
  env:
    - GOPROXY=https://proxy.golang.org,direct
    - GOSUMDB=sum.golang.org

before:
  hooks:
    - go test ./...

builds:
  - id: oidc-proxy
    main: ./cmd/oidc-proxy
    binary: oidc-proxy
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: oidc-proxy
    ids:
      - oidc-proxy
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

docker_digest:
  name_template: digests.txt

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

docker_signs:
  - cmd: cosign
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

snapshot:
  version_template: "{{ .Tag }}-dev"

dockers_v2:
  - id: oidc-proxy
    ids:
      - oidc-proxy
    dockerfile: Dockerfile
    images:
      - ghcr.io/meigma/k8s-aws-oidc
    tags:
      - "{{ .Version }}"
    labels:
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.created: "{{ .Date }}"
    platforms:
      - linux/amd64
      - linux/arm64
