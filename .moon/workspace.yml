# https://moonrepo.dev/docs/config/workspace
$schema: 'https://moonrepo.dev/schemas/workspace.json'

# Single-package repo: use an explicit root project ID so local and CI targets
# remain stable as the workspace grows.
projects:
  root: '.'
  docs: 'docs'
  terraform: 'terraform'

vcs:
  client: 'git'
  defaultBranch: 'master'
