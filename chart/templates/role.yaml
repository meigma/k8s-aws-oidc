{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-aws-oidc-chart.fullname" . }}
  labels:
    {{- include "k8s-aws-oidc-chart.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - {{ include "k8s-aws-oidc-chart.stateSecretName" . }}
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - create
      - patch
  {{- if .Values.leaderElection.enabled }}
  {{- /* The client-go LeaseLock creates the Lease when it is absent and renews it
  via update. RBAC ignores resourceNames for create, so this rule must not be
  name-scoped or leader election fails with "cannot create resource leases". */}}
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update
  {{- end }}
{{- end }}
